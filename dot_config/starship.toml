# Starship Configuration
# A modern, fast, and customizable prompt for any shell
# Documentation: https://starship.rs/config/

# Global settings
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$package\
$nodejs\
$python\
$rust\
$golang\
$java\
$docker_context\
$kubernetes\
$aws\
$gcloud\
$terraform\
$line_break\
$character"""

right_format = """
$cmd_duration\
$time"""

# Wait 10 seconds for starship to check files under the current directory.
scan_timeout = 30

# Timeout for commands executed by starship (in milliseconds).
command_timeout = 10000

# Timeout for starship to scan files (in milliseconds).
add_newline = true

# Character module configuration
[character]
success_symbol = "[ŌØ»](bold green)"
error_symbol = "[ŌØ»](bold red)"
vimcmd_symbol = "[ŌØ«](bold green)"

# Directory module configuration
[directory]
style = "bold cyan"
read_only = " ¾░īŠ"
truncation_length = 0
truncate_to_repo = false

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "¾░ēŹ "
"Music" = "¾░ØÜ "
"Pictures" = "¾░ēÅ "
"Desktop" = "¾░ćä "
"Projects" = "¾░▓ŗ "

# Git configuration
[git_branch]
symbol = "¾░ś¼ "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "="
ahead = "ŌćĪ${count}"
behind = "ŌćŻ${count}"
diverged = "ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "┬╗${count}"
deleted = "Ō£ś${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[git_metrics]
added_style = "bold blue"
deleted_style = "bold red"
only_nonzero_diffs = true
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '
disabled = false

# Language and tool modules
[nodejs]
symbol = "¾░ÄÖ "
style = "bold green"
format = "[$symbol($version )]($style)"

[python]
symbol = "¾░īĀ "
style = "bold yellow"
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

[rust]
symbol = "¾▒śŚ "
style = "bold red"
format = "[$symbol($version )]($style)"

[golang]
symbol = "¾░¤ō "
style = "bold cyan"
format = "[$symbol($version )]($style)"

[java]
symbol = "¾░¼Ę "
style = "bold orange"
format = "[$symbol($version )]($style)"

[package]
symbol = "¾░ÅŚ "
style = "bold bright-blue"
format = "[$symbol$version]($style) "

# Docker and cloud tools
[docker_context]
symbol = "¾░Ī© "
style = "bold blue"
format = "[$symbol$context]($style) "

[kubernetes]
symbol = "ŌśĖ "
style = "bold blue"
format = '[$symbol$context( \($namespace\))]($style) '
disabled = false

[aws]
symbol = "¾░ĖÅ "
style = "bold orange"
format = '[$symbol($profile )(\($region\) )]($style)'

[gcloud]
symbol = "¾▒ćČ "
style = "bold blue"
format = '[$symbol$account(@$domain)(\($region\))]($style) '

[terraform]
symbol = "¾▒üó "
style = "bold purple"
format = "[$symbol$workspace]($style) "

# System information
[username]
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style) "
show_always = false

[hostname]
ssh_only = true
style = "bold green"
format = "[$hostname]($style) "

[time]
disabled = false
style = "bold white"
format = "[$time]($style)"
time_format = "%T"

[cmd_duration]
min_time = 2_000
style = "bold yellow"
format = "[$duration]($style) "

# Memory usage
[memory_usage]
disabled = false
threshold = 75
style = "bold dimmed red"
symbol = "¾░Źø "
format = "$symbol[$ram( | $swap)]($style) "

# Battery
[battery]
full_symbol = "¾░ü╣ "
charging_symbol = "¾░éä "
discharging_symbol = "¾░éā "
unknown_symbol = "¾░üĮ "
empty_symbol = "¾░éÄ "

[[battery.display]]
threshold = 10
style = "bold red"

[[battery.display]]
threshold = 30
style = "bold yellow"

