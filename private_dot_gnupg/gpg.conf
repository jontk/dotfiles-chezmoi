# GnuPG Configuration
# Managed by chezmoi
# Modern security-focused GPG configuration

# Use strong ciphers and digests
personal-cipher-preferences AES256 AES192 AES
personal-digest-preferences SHA512 SHA384 SHA256
personal-compress-preferences ZLIB BZIP2 ZIP Uncompressed

# Default preferences for new keys
default-preference-list SHA512 SHA384 SHA256 AES256 AES192 AES ZLIB BZIP2 ZIP Uncompressed

# Strong digest algorithms
cert-digest-algo SHA512
s2k-digest-algo SHA512
s2k-cipher-algo AES256

# UTF-8 support
charset utf-8

# Show long key IDs
keyid-format 0xlong

# Show fingerprints
with-fingerprint

# Don't include version or comments in output
no-emit-version
no-comments

# Don't disclose key ID in signatures
throw-keyids

# Use full fingerprint when verifying signatures
verify-options show-uid-validity
list-options show-uid-validity

# Limit key server operations
keyserver-options no-honor-keyserver-url
keyserver-options include-revoked

# Display photo IDs if available
list-options show-photos
verify-options show-photos

# Cross-certify subkeys
require-cross-certification

# Disable weak algorithms
disable-cipher-algo 3DES
weak-digest SHA1

# Use agent for passphrase management
use-agent
