# User-Space Development Tools Configuration
# Version pinning for tools installed without sudo
# Update these versions to trigger re-installation

tools:
  # Core installer tools
  eget:
    version: "1.3.4"

  # Language version managers
  fnm:
    version: "1.39.0"
  bun:
    version: "1.3.11"
  uv:
    version: "0.11.3"
  go:
    version: "1.26.1"
  rustup:
    version: "1.29.0"
  rbenv:
    version: "1.3.2"
  ruby_build:
    version: "20260327"
  sdkman:
    version: "5.22.4"
  spack:
    version: "0.22.0"

  # CLI tools installed via eget
  ripgrep:
    repo: "BurntSushi/ripgrep"
    version: "15.1.0"
  fd:
    repo: "sharkdp/fd"
    version: "10.4.2"
  bat:
    repo: "sharkdp/bat"
    version: "0.26.1"
  eza:
    repo: "eza-community/eza"
    version: "0.23.4"
  fzf:
    repo: "junegunn/fzf"
    version: "0.70.0"
  delta:
    repo: "dandavison/delta"
    version: "0.19.2"
  lazygit:
    repo: "jesseduffield/lazygit"
    version: "0.60.0"
  jq:
    repo: "jqlang/jq"
    version: "1.8.1"
  yq:
    repo: "mikefarah/yq"
    version: "4.52.5"
  starship:
    repo: "starship/starship"
    version: "1.24.2"
  zoxide:
    repo: "ajeetdsouza/zoxide"
    version: "0.9.9"
  gh:
    repo: "cli/cli"
    version: "2.89.0"

  # Nerd Fonts
  nerd_fonts:
    version: "3.4.0"
    fonts:
      - "JetBrainsMono"
      - "FiraCode"
      - "Hack"

  # AI Coding Assistants (npm packages)
  claude_code:
    package: "@anthropic-ai/claude-code"
  gemini_cli:
    package: "@google/gemini-cli"
  codex:
    package: "@openai/codex"
  playwright_cli:
    package: "@playwright/cli"

  # Go development tools (installed via go install)
  go_tools:
    golangci_lint:
      package: "github.com/golangci/golangci-lint/v2/cmd/golangci-lint"
      version: "v2.11.4"
    goimports:
      package: "golang.org/x/tools/cmd/goimports"
      version: "latest"
    staticcheck:
      package: "honnef.co/go/tools/cmd/staticcheck"
      version: "latest"
    gosec:
      package: "github.com/securego/gosec/v2/cmd/gosec"
      version: "latest"
    mockgen:
      package: "go.uber.org/mock/mockgen"
      version: "latest"
    mockery:
      package: "github.com/vektra/mockery/v2"
      version: "latest"
    ginkgo:
      package: "github.com/onsi/ginkgo/v2/ginkgo"
      version: "latest"
    goreleaser:
      package: "github.com/goreleaser/goreleaser/v2"
      version: "latest"
    sqlc:
      package: "github.com/sqlc-dev/sqlc/cmd/sqlc"
      version: "latest"
    gqlgen:
      package: "github.com/99designs/gqlgen"
      version: "latest"
    revive:
      package: "github.com/mgechev/revive"
      version: "latest"
    gocyclo:
      package: "github.com/fzipp/gocyclo/cmd/gocyclo"
      version: "latest"
    ineffassign:
      package: "github.com/gordonklaus/ineffassign"
      version: "latest"
    unconvert:
      package: "github.com/mdempsky/unconvert"
      version: "latest"
    misspell:
      package: "github.com/client9/misspell/cmd/misspell"
      version: "latest"
    goverter:
      package: "github.com/jmattheis/goverter/cmd/goverter"
      version: "latest"
    oapi_codegen:
      package: "github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen"
      version: "latest"
    controller_gen:
      package: "sigs.k8s.io/controller-tools/cmd/controller-gen"
      version: "latest"

  # Protobuf tools (installed via go install)
  protobuf_tools:
    protoc_gen_go:
      package: "google.golang.org/protobuf/cmd/protoc-gen-go"
      version: "latest"
    protoc_gen_go_grpc:
      package: "google.golang.org/grpc/cmd/protoc-gen-go-grpc"
      version: "latest"
    protoc_gen_grpc_gateway:
      package: "github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway"
      version: "latest"
    protoc_gen_openapiv2:
      package: "github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-openapiv2"
      version: "latest"
    protoc_gen_doc:
      package: "github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc"
      version: "latest"

  # CLI tools via eget (binary releases)
  buf:
    repo: "bufbuild/buf"
    version: "1.67.0"
  vhs:
    repo: "charmbracelet/vhs"
    version: "0.11.0"
  cilium_cli:
    repo: "cilium/cilium-cli"
    version: "0.19.2"

  # Terminal emulators
  zig:
    version: "0.15.1"
  kitty:
    version: "0.46.2"
  alacritty:
    version: "0.16.1"
  ghostty:
    version: "1.3.1"
    repo: "ghostty-org/ghostty"
